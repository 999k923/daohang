<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>静态导航站</title>

<style>
:root{
 --bg:linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
 --bg-solid:#f0f4ff;
 --panel:rgba(255,255,255,0.95);
 --panel-glass:rgba(255,255,255,0.85);
 --text:#1a1a2e;
 --muted:#6366f1;
 --line:rgba(99,102,241,0.15);
 --primary:#6366f1;
 --primary-light:#a5b4fc;
 --danger:#f43f5e;
 --ok:#10b981;
 --radius:20px;
 --shadow:0 20px 60px rgba(99,102,241,0.15), 0 8px 25px rgba(0,0,0,0.08);
 --glow:0 0 40px rgba(99,102,241,0.3);
}

*{box-sizing:border-box}
body{
 margin:0;
 font-family:'Segoe UI',system-ui,-apple-system,BlinkMacSystemFont,Roboto,sans-serif;
 background:var(--bg);
 background-attachment:fixed;
 color:var(--text);
 min-height:100vh;
 height:auto;
 overflow:visible;
 position:relative;
}
body::before{
 content:"";
 position:fixed;
 inset:0;
 background:radial-gradient(circle at 20% 80%, rgba(102,126,234,0.4) 0%, transparent 50%),
             radial-gradient(circle at 80% 20%, rgba(118,75,162,0.4) 0%, transparent 50%),
             radial-gradient(circle at 50% 50%, rgba(240,147,251,0.3) 0%, transparent 60%);
 pointer-events:none;
 z-index:-1;
}

a{color:inherit;text-decoration:none}

.toolbar{display:flex;gap:12px;flex-wrap:wrap}
.btn{
 border:1px solid var(--line);
 background:var(--panel);
 border-radius:999px;
 padding:10px 16px;
 cursor:pointer;
 font-size:13px;
 font-weight:500;
 transition:all 0.25s ease;
 box-shadow:0 4px 15px rgba(99,102,241,0.1);
}
.btn:hover{
 transform:translateY(-2px);
 box-shadow:0 8px 25px rgba(99,102,241,0.2);
}
.btn.primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);border-color:transparent;color:#fff}
.btn.primary:hover{background:linear-gradient(135deg,#4f46e5,#7c3aed);box-shadow:0 8px 30px rgba(99,102,241,0.35)}
.btn.ok{background:linear-gradient(135deg,#10b981,#34d399);border-color:transparent;color:#fff}
.btn.ok:hover{box-shadow:0 8px 30px rgba(16,185,129,0.35)}
.btn.danger{background:linear-gradient(135deg,#f43f5e,#fb7185);border-color:transparent;color:#fff}
.btn.danger:hover{box-shadow:0 8px 30px rgba(244,63,94,0.35)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

.adminOnly{display:none}
body.isAdmin .adminOnly{display:inline-flex}

/* ===== Layout ===== */
.wrap{max-width:1280px;margin:0 auto;padding:24px;min-height:100vh}
.grid{
 display:grid;
 grid-template-columns:280px 1fr;
 gap:20px;
}

.sidebarCollapsed .grid{grid-template-columns:56px 1fr}
@media(max-width:900px){
 .grid{grid-template-columns:1fr}
}

.sidebar,.panel{
 background:var(--panel);
 border:1px solid var(--line);
 border-radius:var(--radius);
 box-shadow:var(--shadow);
 backdrop-filter:blur(20px);
 -webkit-backdrop-filter:blur(20px);
}

/* ===== Sidebar ===== */
.sidebar{padding:14px;overflow:visible}
.sidebarHeader{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin-bottom:10px;
 gap:10px;
 position:sticky;
 top:0;
 background:var(--panel);
 padding:10px 0 12px;
 z-index:5;
 border-bottom:1px solid rgba(99,102,241,0.1);
}
.sidebarHeaderTitle{
 display:flex;
 align-items:center;
 gap:12px;
 min-width:0;
}

.sidebarBrandIcon{
 width:32px;
 height:32px;
 border-radius:12px;
 border:none;
 background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#a855f7 100%);
 display:inline-flex;
 align-items:center;
 justify-content:center;
 flex:0 0 auto;
 box-shadow:0 4px 15px rgba(99,102,241,0.35);
}
.sidebarBrandIcon svg{width:18px;height:18px;display:block;filter:brightness(0) invert(1)}
.sidebarBrandText{
 display:flex;
 flex-direction:column;
 min-width:0;
}
.sidebarBrandTitle{
 font-weight:800;
 font-size:14px;
 line-height:1.1;
 background:linear-gradient(135deg,#6366f1,#8b5cf6);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
 background-clip:text;
 white-space:nowrap;
 overflow:hidden;
 text-overflow:ellipsis;
}
.sidebarBrandSub{
 font-size:12px;
 color:var(--muted);
 line-height:1.1;
 white-space:nowrap;
 overflow:hidden;
 text-overflow:ellipsis;
 display:none; /* 不需要副标题文案 */
}
.sidebarHeaderActions{
 display:flex;
 align-items:center;
 gap:10px;
 flex:0 0 auto;
}

/* 紧凑型图标按钮（侧边栏标题栏专用） */
.iconBtn{
 border:none;
 background:var(--panel);
 border-radius:12px;
 width:36px;
 height:36px;
 display:inline-flex;
 align-items:center;
 justify-content:center;
 cursor:pointer;
 user-select:none;
 transition:all 0.2s ease;
 box-shadow:0 2px 8px rgba(99,102,241,0.1);
}
.iconBtn:hover{background:linear-gradient(135deg,#f0f4ff,#e8ebff);transform:translateY(-1px);box-shadow:0 4px 15px rgba(99,102,241,0.2)}
.iconBtn:active{transform:translateY(0)}
.iconBtn svg{width:16px;height:16px;display:block}

/* 折叠时：隐藏标题文本与管理员操作按钮（保留折叠按钮） */
.sidebarCollapsed .sidebarBrandText{display:none}
.sidebarCollapsed .sidebarHeaderActions .adminOnly{display:none !important}

.sidebarToggleBtn{
 border:none;
 background:var(--panel);
 border-radius:12px;
 width:36px;
 height:36px;
 display:inline-flex;
 align-items:center;
 justify-content:center;
 cursor:pointer;
 transition:all 0.2s ease;
 box-shadow:0 2px 8px rgba(99,102,241,0.1);
}
.sidebarToggleBtn:hover{background:linear-gradient(135deg,#f0f4ff,#e8ebff);transform:translateY(-1px);box-shadow:0 4px 15px rgba(99,102,241,0.2)}
.sidebarCollapsed #catList{display:none}
.sidebarCollapsed .sidebarTools{display:none}
.sidebarTools{
 display:flex;
 flex-direction:column;
 gap:12px;
 margin:10px 0 14px;
}
.sidebarTools .btn,
.sidebarTools input{width:100%}
.sidebarTools input{
 padding:10px 14px;
 border-radius:12px;
 border:1px solid var(--line);
 background:var(--panel);
 font-size:13px;
 transition:all 0.2s ease;
 box-shadow:0 2px 8px rgba(99,102,241,0.08);
}
.sidebarTools input:focus{
 outline:none;
 border-color:var(--primary);
 box-shadow:0 0 0 3px rgba(99,102,241,0.15),0 4px 15px rgba(99,102,241,0.1);
}
.sidebarTools input::placeholder{color:var(--muted)}
.catItem{
 padding:12px;
 border-radius:14px;
 margin-bottom:8px;
 cursor:pointer;
 display:grid;
 grid-template-columns:minmax(0,1fr) auto;
 align-items:center;
 gap:10px;
 min-height:48px;
}
.catItem.active{background:linear-gradient(135deg,rgba(99,102,241,0.12),rgba(139,92,246,0.08));border-color:rgba(99,102,241,0.25)}
/* ===== Sidebar 一级分类 hover 动效 ===== */
.catItem{
 /* 新增 */
 position: relative;
 transition: transform .18s ease, box-shadow .18s ease, background .18s ease, border-color .18s ease;
 border:1px solid transparent;
}

.catItem::before{
 content:"";
 position:absolute;
 left:6px;
 top:12px;
 bottom:12px;
 width:4px;
 border-radius:999px;
 background: linear-gradient(180deg,#6366f1,#8b5cf6);
 opacity:0;
 transform: scaleY(.6);
 transition: opacity .18s ease, transform .18s ease;
}


@media (hover:hover){
 .catItem:hover{
 background:linear-gradient(135deg,rgba(99,102,241,0.06),rgba(139,92,246,0.04));
 border-color: rgba(99,102,241,0.18);
 box-shadow: 0 8px 25px rgba(99,102,241,0.12);
 transform: translateY(-2px);
 }
 .catItem:hover::before{
 opacity:1;
 transform: scaleY(1);
 }
}

.catItem.active{
 border-color: rgba(99,102,241,0.25);
}
.catItem.active::before{
 opacity:1;
 transform: scaleY(1);
}

.catGroup{margin-bottom:10px}
.catToggle{
 border:none;
 background:transparent;
 cursor:pointer;
 display:inline-flex;
 align-items:center;
 justify-content:center;
 width:30px;
 height:30px;
 border-radius:10px;
 transition:all 0.2s ease;
}
.catToggle:hover{background:rgba(99,102,241,0.1)}
.catToggleIcon{
 display:inline-block;
 transition:transform .2s ease;
 font-size:12px;
 color:var(--muted);
}
.catIcon{
 width:24px;
 height:24px;
 display:inline-flex;
 align-items:center;
 justify-content:center;
 border-radius:10px;
 background:linear-gradient(135deg,#f0f4ff,#e8ebff);
 border:none;
 font-size:14px;
 flex:0 0 24px;
 overflow:hidden;
 box-shadow:0 2px 6px rgba(99,102,241,0.1);
}
.catIcon img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.catMain{
  display:flex;
  align-items:center;
  gap:8px;
  min-width:0;
}
.catName{
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.catActions{
  display:flex;
  align-items:center;
  gap:6px;
  justify-content:flex-end;
  min-width:12px;
}
.catAlignLine{
 width:3px;
 height:26px;
 border-radius:999px;
 background:linear-gradient(180deg,#6366f1,#8b5cf6);
 flex:0 0 auto;
 opacity:0.6;
}
.catItem.active .catAlignLine{
 background:linear-gradient(180deg,#6366f1,#a855f7);
 opacity:1;
}
@media (hover:hover){
 .catItem:hover .catAlignLine{
 background:linear-gradient(180deg,#818cf8,#a78bfa);
 opacity:0.85;
 }
}
.catGroup.expanded .catToggleIcon{transform:rotate(90deg)}
.subList{
 margin-left:14px;
 padding-left:12px;
 border-left:2px solid rgba(99,102,241,0.2);
 display:none;
 flex-direction:column;
 gap:6px;
 margin-bottom:10px;
}
.catGroup.expanded .subList{display:flex}
.subItem{
 padding:10px 12px;
 border-radius:12px;
 cursor:pointer;
 font-size:13px;
 color:var(--text);
 display:flex;
 justify-content:space-between;
 gap:10px;
 transition:all 0.2s ease;
}
.subItem:hover{background:linear-gradient(135deg,rgba(99,102,241,0.08),rgba(139,92,246,0.05));transform:translateX(3px)}
.subItem.active{background:linear-gradient(135deg,rgba(99,102,241,0.15),rgba(139,92,246,0.1));color:#4f46e5;font-weight:600}

/* ===== Panel ===== */
.panel{padding:18px;height:100%;overflow:visible}
.subcats{display:flex;flex-direction:column;gap:20px}

.subcat{
 border:1px solid var(--line);
 border-radius:18px;
 background:rgba(255,255,255,0.6);
 backdrop-filter:blur(10px);
 -webkit-backdrop-filter:blur(10px);
}
.subHead{
 padding:14px 16px;
 display:flex;
 justify-content:space-between;
 align-items:center;
 border-bottom:1px solid rgba(99,102,241,0.1);
 background:linear-gradient(135deg,rgba(99,102,241,0.03),rgba(139,92,246,0.02));
 border-radius:18px 18px 0 0;
}

/* ===== Cards ===== */
.cards{
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:14px;
 padding:14px;
}
@media(max-width:900px){.cards{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.cards{grid-template-columns:1fr}}

.card{
 background:var(--panel);
 border:1px solid var(--line);
 border-radius:18px;
 padding:14px;
 display:flex;
 flex-direction:column;
 gap:10px;
 min-height:150px;
 position:relative;
 overflow:hidden;
 transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
}
.card::after{
 content:"";
 position:absolute;
 inset:-40% -60%;
 background:linear-gradient(120deg, transparent 0%, rgba(99,102,241,.15) 45%, rgba(168,85,247,.2) 55%, transparent 100%);
 transform:translateX(-70%) rotate(8deg);
 opacity:0;
 pointer-events:none;
}
@media(hover:hover){
 .card:hover{
 transform:translateY(-5px);
 border-color:rgba(99,102,241,.35);
 box-shadow:0 20px 40px rgba(99,102,241,.12),0 8px 20px rgba(0,0,0,.06);
 }
 .card:hover::after{
 opacity:1;
 animation:cardShine .8s ease;
 }
}
@keyframes cardShine{
 from{transform:translateX(-70%) rotate(8deg);}
 to{transform:translateX(70%) rotate(8deg);}
}

.cardTitle{
 font-weight:700;
 font-size:14px;
 line-height:1.4;
 display:-webkit-box;
 -webkit-line-clamp:2;
 -webkit-box-orient:vertical;
 overflow:hidden;
 color:var(--text);
}

.cardUrl{
 font-size:12px;
 color:var(--muted);
 white-space:nowrap;
 overflow:hidden;
 text-overflow:ellipsis;
}

.cardDesc{
 font-size:12px;
 color:#64748b;
 line-height:1.5;
 display:-webkit-box;
 -webkit-line-clamp:2;
 -webkit-box-orient:vertical;
 overflow:hidden;
}

/* ===== Tooltip ===== */
.tooltip{
 position:fixed;
 z-index:99999;
 max-width:420px;
 background:linear-gradient(135deg,rgba(30,27,75,0.97),rgba(55,48,107,0.97));
 color:#fff;
 border-radius:16px;
 padding:14px 16px;
 box-shadow:0 20px 50px rgba(99,102,241,0.25),0 8px 20px rgba(0,0,0,.2);
 display:none;
 pointer-events:none;
 border:1px solid rgba(99,102,241,0.2);
}
.tooltip .ttTitle{font-weight:700;font-size:14px;margin-bottom:8px;color:#e0e7ff}
.tooltip .ttUrl{font-size:12px;opacity:.85;word-break:break-all;margin-bottom:8px;color:#c7d2fe}
.tooltip .ttDesc{font-size:12px;opacity:.8;line-height:1.5;color:#e0e7ff}

/* ===== Modal / Toast ===== */
.modalMask{
 position:fixed;inset:0;
 background:rgba(30,27,75,0.5);
 backdrop-filter:blur(8px);
 -webkit-backdrop-filter:blur(8px);
 display:none;
 align-items:center;
 justify-content:center;
 z-index:1000;
}
.toast{
 position:fixed;
 bottom:24px;
 left:50%;
 transform:translateX(-50%);
 background:linear-gradient(135deg,#6366f1,#8b5cf6);
 color:#fff;
 padding:12px 20px;
 border-radius:999px;
 display:none;
 font-weight:500;
 box-shadow:0 10px 30px rgba(99,102,241,0.3);
}

/* ===== Card fixed size & no overflow (修复卡片撑开/溢出) ===== */
.cards{
 grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
 overflow: hidden;
}
.card{
 height: 145px; /* 固定卡片高度 */
 min-height: 145px; /* 覆盖旧的 min-height */
 overflow: hidden; /* 内容不允许溢出卡片 */
 min-width: 0; /* 防止子元素撑破 grid */
}
.cardTitle{
 display: -webkit-box;
 -webkit-line-clamp: 2;
 -webkit-box-orient: vertical;
 overflow: hidden;
}
.cardUrl{
 white-space: nowrap;
 overflow: hidden;
 text-overflow: ellipsis;
}
.cardDesc{
 display: -webkit-box;
 -webkit-line-clamp: 2;
 -webkit-box-orient: vertical;
 overflow: hidden;
}

/* 图标永远裁切在框内（防止图片溢出） */
.card img{
 object-fit: cover;
 max-width: 36px;
 max-height: 36px;
 border-radius: 10px;
 box-shadow:0 2px 8px rgba(99,102,241,0.15);
}


/* ===== Compact cards (更紧凑，一屏更多网站) ===== */
.cards{
 grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
 gap: 12px;
 padding: 12px;
}
.card{
 height: 108px;
 min-height: 108px;
 padding: 12px;
 border-radius: 16px;
 gap: 8px;
}
.cardTitle{
 font-size: 13px;
 -webkit-line-clamp: 1;
}
.cardUrl{
 font-size: 11px;
}
.cardDesc{
 display:none; /* 紧凑模式默认隐藏描述（hover 气泡可看完整） */
}
.card img{
 width: 32px !important;
 height: 32px !important;
 max-width: 32px !important;
 max-height: 32px !important;
 border-radius: 10px !important;
 box-shadow:0 2px 6px rgba(99,102,241,0.12) !important;
}


/* ===== Ultra Compact cards（一屏最大化） ===== */
.cards{
 grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
 gap: 10px;
 padding: 10px;
}
.card{
 height: 76px;
 min-height: 76px;
 padding: 10px;
 border-radius: 14px;
 gap: 6px;
}
.cardTitle{
 font-size: 12px;
 -webkit-line-clamp: 1;
}
.cardUrl{
 font-size: 10px;
}
.cardDesc{display:none;}
.card img{
 width: 26px !important;
 height: 26px !important;
 max-width: 26px !important;
 max-height: 26px !important;
 border-radius: 8px !important;
 box-shadow:0 2px 5px rgba(99,102,241,0.1) !important;
}


/* ===== Mobile: auto switch to list view ===== */
@media (max-width: 600px){
 .cards{
 display:flex;
 flex-direction:column;
 gap:10px;
 padding:10px;
 }
 .card{
 height:auto;
 min-height:0;
 flex-direction:row;
 align-items:center;
 padding:12px;
 gap:12px;
 }
 /* left block (icon + text) should shrink correctly */
 .card > div:first-child{
 flex:1 1 auto;
 min-width:0;
 }
 /* action buttons column stays compact */
 .card > div:last-child{
 flex:0 0 auto;
 }
 /* text a bit larger for readability on phone */
 .cardTitle{font-size:14px;-webkit-line-clamp:1}
 .cardUrl{font-size:12px}
 .card img{
 width:30px !important;
 height:30px !important;
 max-width:30px !important;
 max-height:30px !important;
 border-radius:10px !important;
 box-shadow:0 2px 6px rgba(99,102,241,0.12) !important;
 }
}


/* ===== Mobile v3: 2-column cards + overlay sidebar + floating toggle ===== */
.mobileBackdrop{
 position:fixed;
 inset:0;
 background:rgba(30,27,75,0.4);
 backdrop-filter:blur(4px);
 -webkit-backdrop-filter:blur(4px);
 z-index:1990;
 display:none;
}
body.mobileSidebarOpen .mobileBackdrop{ display:block; }

@media (max-width: 600px){
 /* layout: content only; sidebar overlay (no extra column) */
 .grid{ grid-template-columns: 1fr !important; }
 .sidebar{
 position:fixed;
 left:0;
 top:0;
 bottom:0;
 width:min(82vw, 320px);
 z-index:2000;
 transform:translateX(-110%);
 transition:transform .2s ease;
 border-radius:0 20px 20px 0;
 box-shadow:0 20px 50px rgba(99,102,241,0.25);
 background:rgba(255,255,255,0.98);
 backdrop-filter:blur(20px);
 -webkit-backdrop-filter:blur(20px);
 }
 body.mobileSidebarOpen .sidebar{ transform:translateX(0); }

 /* floating toggle stays visible */
 #btnToggleSidebar{
 position:fixed !important;
 right:12px;
 top:12px;
 z-index:3000;
 width:48px;
 height:48px;
 border-radius:16px;
 box-shadow:0 12px 35px rgba(99,102,241,0.2);
 background:var(--panel);
 border:1px solid var(--line);
 }

 /* cards: default 2 columns */
 .cards{
 display:grid !important;
 grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
 gap:10px !important;
 padding:10px !important;
 }
 .card{
 height: 88px !important;
 min-height: 88px !important;
 padding: 10px !important;
 }
 /* keep text tidy */
 .cardTitle{-webkit-line-clamp:1}
 .cardDesc{display:none !important;}
}


/* ===== Mobile v4: 顶部按钮栏（折叠态可见），展开为左侧抽屉 ===== */
.mobileTopbar{
 display:none;
}
.mobileToggleBtn{
 border:1px solid var(--line);
 background:var(--panel);
 border-radius:16px;
 width:48px;
 height:48px;
 font-size:20px;
 line-height:1;
 cursor:pointer;
 box-shadow:0 10px 28px rgba(99,102,241,0.18);
 transition:all 0.2s ease;
}
.mobileToggleBtn:hover{box-shadow:0 12px 35px rgba(99,102,241,0.25)}

@media (max-width: 600px){
 .mobileTopbar{
 display:flex;
 position:fixed;
 top:0;
 left:0;
 right:0;
 height:60px;
 z-index:3000;
 align-items:center;
 justify-content:flex-end;
 padding:0 14px;
 background:rgba(255,255,255,0.95);
 backdrop-filter:blur(20px);
 -webkit-backdrop-filter:blur(20px);
 border-bottom:1px solid rgba(99,102,241,0.1);
 }

 /* 内容下移，避免被顶栏遮住 */
 .wrap{ padding-top:60px; }

 /* 侧边栏默认不占列，抽屉显示 */
 .grid{ grid-template-columns: 1fr !important; }

 .sidebar{
 position:fixed;
 left:0;
 top:60px; /* 从顶栏下方开始 */
 bottom:0;
 width:min(82vw, 320px);
 z-index:2000;
 transform:translateX(-110%);
 transition:transform .2s ease;
 border-radius:0 20px 20px 0;
 box-shadow:0 20px 50px rgba(99,102,241,0.25);
 background:rgba(255,255,255,0.98);
 backdrop-filter:blur(20px);
 -webkit-backdrop-filter:blur(20px);
 }
 body.mobileSidebarOpen .sidebar{ transform:translateX(0); }

 /* 原来的侧边栏内折叠按钮（会随 transform 跑掉）在移动端隐藏 */
 #btnToggleSidebar{ display:none !important; }

 /* 背景遮罩 */
 .mobileBackdrop{ z-index:1990; }

 /* 卡片两列占满 */
 .cards{
 display:grid !important;
 grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
 gap:10px !important;
 padding:10px !important;
 }
}


body.mobileSidebarOpen .sidebarTools{ display:block !important; }

<script>
/** ==========================
 *  API 配置（同域反代 /api）
 * ========================== */
const API_DATA_URL = "/api/data";
const API_LOGIN_URL = "/api/login";
const API_LOGOUT_URL = "/api/logout";
const TOKEN_KEY = "navsite_api_token_v1";
const LOCAL_CACHE_KEY = "navsite_local_cache_v1";

/** ==========================
 *  State
 * ========================== */
let state = { version: 1, updatedAt: new Date().toISOString(), categories: [] };
let activeCatId = null;
let searchText = "";
let activeSubcatId = null;
let isSidebarCollapsed = false;
const expandedCatIds = new Set();

/** ==========================
 *  Utils
 * ========================== */
function uid(){ return Math.random().toString(16).slice(2) + Date.now().toString(16); }
function byOrder(a,b){ return (a.order ?? 0) - (b.order ?? 0); }
function nextOrder(arr){ return (arr||[]).reduce((m,x)=>Math.max(m, Number(x.order)||0),0)+1; }
function fmtTime(iso){
  try{
    const d = new Date(iso);
    const p=n=>String(n).padStart(2,"0");
    return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
  }catch{return iso}
}
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display="block";
  clearTimeout(toast._timer);
  toast._timer=setTimeout(()=>t.style.display="none",1700);
}

function getToken(){ return sessionStorage.getItem(TOKEN_KEY) || ""; }
function isAdmin(){ return !!getToken(); }
function setAdminToken(token){
  if(token) sessionStorage.setItem(TOKEN_KEY, token);
  else sessionStorage.removeItem(TOKEN_KEY);
  document.body.classList.toggle("isAdmin", !!token);
  syncLoginUI();
  render();
}
function syncLoginUI(){
  const btnLogin = document.getElementById("btnLogin");
  const btnLogout = document.getElementById("btnLogout");
  const loginText = document.getElementById("loginText");
  btnLogin.style.display = isAdmin() ? "none" : "inline-flex";
  btnLogout.style.display = isAdmin() ? "inline-flex" : "none";
  loginText.textContent = isAdmin() ? "管理员已登录" : "游客模式";

  const btnUserM = document.getElementById("btnUser_m");
  if(btnUserM){
    btnUserM.title = isAdmin() ? "退出" : "登录";
    btnUserM.setAttribute("aria-label", isAdmin() ? "退出" : "登录");
  }

}

function syncSidebarState(){
  document.body.classList.toggle("sidebarCollapsed", isSidebarCollapsed);
}

/** URL 显示短链接（不撑高度） */
function shortUrl(url){
  try{
    const u = new URL(url);
    return u.host + "/…";
  }catch{
    return url || "";
  }
}

/** favicon / icon */
function getDomainFromUrl(u){ try { return new URL(u).hostname; } catch { return ""; } }
function autoFaviconUrl(siteUrl, size=64){
  const domain = getDomainFromUrl(siteUrl);
  if(!domain) return "";
  return `${location.protocol}//${domain}/favicon.ico`;
}
function placeholderIconDataUrl(){
  return "data:image/svg+xml;base64," + btoa(
    `<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64'>
      <rect width='64' height='64' rx='18' fill='rgba(16,24,40,.05)'/>
      <path d='M22 32h20' stroke='rgba(16,24,40,.35)' stroke-width='4' stroke-linecap='round'/>
    </svg>`
  );
}
function resolveIconSrc(site){
  const manual = (site.icon || "").trim();
  if(manual) return manual;
  const auto = autoFaviconUrl(site.url, 64);
  return auto || placeholderIconDataUrl();
}

function getCategoryIcon(cat){
  const raw = (cat.icon || "").trim();
  return raw || "📁";
}
function createCategoryIconNode(cat){
  const icon = getCategoryIcon(cat);
  const wrap = document.createElement("div");
  wrap.className = "catIcon";
  if(/^https?:\/\//.test(icon) || icon.startsWith("data:")){
    const img = document.createElement("img");
    img.src = icon;
    img.alt = "icon";
    img.onerror = ()=>{ img.onerror=null; wrap.textContent="📁"; };
    wrap.appendChild(img);
  }else{
    wrap.textContent = icon;
  }
  return wrap;
}

function subcatAnchorId(id){ return `subcat-${id}`; }
function scrollToSubcat(id){
  const panel = document.querySelector(".panel");
  const el = document.getElementById(subcatAnchorId(id));
  if(!panel || !el) return;
  const top = Math.max(0, el.offsetTop - 8);
  panel.scrollTo({ top, behavior:"smooth" });
}
function getActiveSubcatId(){ return activeSubcatId; }

/** ==========================
 *  Tooltip Preview
 * ========================== */
const TT = { el:null, t:null, u:null, d:null, visible:false };
function initTooltip(){
  TT.el = document.getElementById("tooltip");
  TT.t  = document.getElementById("ttTitle");
  TT.u  = document.getElementById("ttUrl");
  TT.d  = document.getElementById("ttDesc");
}
function showTooltip(payload){
  if(!TT.el) initTooltip();
  TT.t.textContent = payload.title || "";
  TT.u.textContent = payload.url || "";
  TT.d.textContent = payload.desc || "";
  TT.el.style.display = "block";
  TT.visible = true;
}
function hideTooltip(){
  if(!TT.el) return;
  TT.el.style.display="none";
  TT.visible=false;
}
function moveTooltip(clientX, clientY){
  if(!TT.el || !TT.visible) return;
  const margin=14, offset=16;
  let x=clientX+offset, y=clientY+offset;
  const rect = TT.el.getBoundingClientRect();
  if(x+rect.width+margin>window.innerWidth) x=clientX-rect.width-offset;
  if(y+rect.height+margin>window.innerHeight) y=clientY-rect.height-offset;
  x=Math.max(margin, Math.min(x, window.innerWidth-rect.width-margin));
  y=Math.max(margin, Math.min(y, window.innerHeight-rect.height-margin));
  TT.el.style.left=x+"px";
  TT.el.style.top=y+"px";
}

/** ==========================
 *  Modal
 * ========================== */
const modalMask = document.getElementById("modalMask");
const modalTitle = document.getElementById("modalTitle");
const modalBody = document.getElementById("modalBody");
const modalFoot = document.getElementById("modalFoot");
document.getElementById("modalClose").onclick = closeModal;
modalMask.addEventListener("click", (e)=>{ if(e.target===modalMask) closeModal(); });

function openModal(title, bodyNodes, footNodes){
  modalTitle.textContent = title;
  modalBody.innerHTML="";
  modalFoot.innerHTML="";
  bodyNodes.forEach(n=>modalBody.appendChild(n));
  footNodes.forEach(n=>modalFoot.appendChild(n));
  modalMask.style.display="flex";
}
function closeModal(){ modalMask.style.display="none"; }

function button(text, cls, onClick){
  const b=document.createElement("button");
  b.className=cls;
  b.textContent=text;
  b.onclick=onClick;
  return b;
}
function input(labelText, value="", type="text"){
  const wrap=document.createElement("div");
  const lab=document.createElement("div");
  lab.textContent=labelText;
  lab.style.fontSize="12px";
  lab.style.color="var(--muted)";
  lab.style.marginBottom="6px";
  const el=document.createElement("input");
  el.type=type;
  el.value=value??"";
  el.style.width="100%";
  el.style.padding="10px";
  el.style.border="1px solid var(--line)";
  el.style.borderRadius="12px";
  el.autocomplete="off";
  wrap.append(lab, el);
  return {wrap, el};
}
function textarea(labelText, value=""){
  const wrap=document.createElement("div");
  const lab=document.createElement("div");
  lab.textContent=labelText;
  lab.style.fontSize="12px";
  lab.style.color="var(--muted)";
  lab.style.marginBottom="6px";
  const el=document.createElement("textarea");
  el.value=value??"";
  el.style.width="100%";
  el.style.padding="10px";
  el.style.border="1px solid var(--line)";
  el.style.borderRadius="12px";
  el.style.minHeight="90px";
  wrap.append(lab, el);
  return {wrap, el};
}
function row2(a,b){
  const r=document.createElement("div");
  r.style.display="flex";
  r.style.gap="10px";
  r.append(a,b);
  a.style.flex="1"; b.style.flex="1";
  return r;
}

/** ==========================
 *  API Calls
 * ========================== */
async function apiGetData(){
  const res = await fetch(API_DATA_URL, { cache:"no-store" });
  if(!res.ok) throw new Error("GET /api/data failed");
  const obj = await res.json();
  obj.categories ||= [];
  obj.categories.forEach(c=>{
    if(typeof c.icon !== "string") c.icon = "";
    c.subcategories ||= [];
    c.subcategories.forEach(s=>{
      s.sites ||= [];
      s.sites.forEach(site=>{ if(typeof site.icon !== "string") site.icon=""; });
    });
  });
  return obj;
}
async function apiLogin(username, password){
  const res = await fetch(API_LOGIN_URL, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ username, password })
  });
  if(!res.ok) throw new Error("login failed");
  return await res.json();
}
async function apiLogout(){
  const token=getToken();
  if(!token) return;
  try{
    await fetch(API_LOGOUT_URL, { method:"POST", headers:{ "Authorization":"Bearer "+token } });
  }catch{}
}
async function apiSaveData(){
  if(!isAdmin()) return;
  const token=getToken();
  const res = await fetch(API_DATA_URL, {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body: JSON.stringify(state)
  });
  if(!res.ok){
    if(res.status===401){
      toast("保存失败：登录已过期");
      setAdminToken("");
      return;
    }
    toast("保存失败："+res.status);
    return;
  }
  const out = await res.json();
  if(out?.updatedAt) state.updatedAt = out.updatedAt;
}

function saveLocalCache(){ try{ localStorage.setItem(LOCAL_CACHE_KEY, JSON.stringify(state)); }catch{} }
function loadLocalCache(){ try{ const raw=localStorage.getItem(LOCAL_CACHE_KEY); return raw?JSON.parse(raw):null; }catch{return null;} }
async function saveAll(){
  saveLocalCache();
  await apiSaveData();
}

function requireAdmin(){
  if(!isAdmin()){
    toast("需要管理员登录");
    openLoginModal();
    return false;
  }
  return true;
}

/** ==========================
 *  Render
 * ========================== */
function getActiveCat(){
  return state.categories.find(c=>c.id===activeCatId) || state.categories[0] || null;
}

function render(){
  renderSidebar();
  renderContent();
}

function renderSidebar(){
  const list=document.getElementById("catList");
  list.innerHTML="";
  const cats=[...(state.categories||[])].sort(byOrder);
  if(!activeCatId && cats[0]) activeCatId=cats[0].id;

  cats.forEach(cat=>{
    const group=document.createElement("div");
    group.className="catGroup"+(expandedCatIds.has(cat.id)?" expanded":"");

    const item=document.createElement("div");
    item.className="catItem"+(cat.id===activeCatId?" active":"");

    const left=document.createElement("div");
    left.className="catMain";

    const toggle=document.createElement("button");
    toggle.className="catToggle";
    toggle.setAttribute("aria-label", "展开/收起");
    toggle.onclick=(e)=>{
      e.stopPropagation();
      if(expandedCatIds.has(cat.id)) expandedCatIds.delete(cat.id);
      else expandedCatIds.add(cat.id);
      renderSidebar();
    };

    const toggleIcon=document.createElement("span");
    toggleIcon.className="catToggleIcon";
    toggleIcon.textContent="▶";

    toggle.appendChild(toggleIcon);

    const name=document.createElement("div");
    name.className="catName";
    name.textContent=cat.name;
    name.title=cat.name||"";

    const catIcon = createCategoryIconNode(cat);

    left.append(toggle, catIcon, name);

    const right=document.createElement("div");
    right.className="catActions";

    const line=document.createElement("span");
    line.className="catAlignLine";
    line.setAttribute("aria-hidden","true");
    
    const edit=document.createElement("button");
    edit.className="btn adminOnly";
    edit.textContent="✎";
    edit.style.padding="6px 10px";
    edit.onclick=(e)=>{ e.stopPropagation(); openCategoryModal(cat); };

    const del=document.createElement("button");
    del.className="btn danger adminOnly";
    del.textContent="🗑";
    del.style.padding="6px 10px";
    del.onclick=async(e)=>{
      e.stopPropagation();
      if(!requireAdmin()) return;
      if(confirm(`确定删除「${cat.name}」？`)){
        state.categories = state.categories.filter(c=>c.id!==cat.id);
        expandedCatIds.delete(cat.id);
        if(activeCatId===cat.id) activeCatId = state.categories[0]?.id || null;
        await saveAll();
        render();
      }
    };

    item.onclick = () => {
  // 先选中这个一级分类
  activeCatId = cat.id;
  activeSubcatId = null;

  // 再切换展开/收起（点哪里都一样）
  if (expandedCatIds.has(cat.id)) expandedCatIds.delete(cat.id);
  else expandedCatIds.add(cat.id);

  render();
};


    right.append(edit, del, line);
    item.append(left, right);

    const subList=document.createElement("div");
    subList.className="subList";
    const subcats=(cat.subcategories||[]).slice().sort(byOrder);
    if(!subcats.length){
      const empty=document.createElement("div");
      empty.style.fontSize="12px";
      empty.style.color="var(--muted)";
      empty.style.padding="4px 10px";
      empty.textContent="暂无二级分类";
      subList.appendChild(empty);
    }else{
      subcats.forEach(subcat=>{
        const subItem=document.createElement("div");
        subItem.className="subItem";
        if(cat.id===activeCatId && subcat.id===getActiveSubcatId()) subItem.classList.add("active");

        const subName=document.createElement("div");
        subName.textContent=subcat.name;

        const subMeta=document.createElement("div");
        subMeta.style.fontSize="12px";
        subMeta.style.color="var(--muted)";
        subMeta.textContent=String(subcat.sites?.length||0);

        subItem.append(subName, subMeta);
        subItem.onclick=()=>{
          activeCatId=cat.id;
          activeSubcatId=subcat.id;
          expandedCatIds.add(cat.id);
          render();
          requestAnimationFrame(()=>scrollToSubcat(subcat.id));
        };
        subList.appendChild(subItem);
      });
    }

    group.append(item, subList);
    list.appendChild(group);
  });
}

function renderContent(){
  const cat=getActiveCat();
  const content=document.getElementById("content");
  const title=document.getElementById("activeTitle");
  const meta=document.getElementById("activeMeta");

  if(!cat){
    title.textContent="没有分类";
    meta.textContent="请管理员登录后新增";
    content.innerHTML="<div style='padding:20px;color:var(--muted)'>暂无数据</div>";
    return;
  }

  title.textContent=cat.name;
  meta.textContent=`二级分类：${cat.subcategories?.length||0} · 最近更新：${fmtTime(state.updatedAt)}`;

  const subcats=(cat.subcategories||[]).slice().sort(byOrder);
  if(activeSubcatId && !subcats.some(sc=>sc.id===activeSubcatId)) activeSubcatId=null;

  // 搜索（全局）
  if(searchText.trim()){
    const q=searchText.trim().toLowerCase();
    const matched=[];
    const cats=[...(state.categories||[])].sort(byOrder);
    cats.forEach(c=>{
      const scs=(c.subcategories||[]).slice().sort(byOrder);
      scs.forEach(sc=>{
        const sites=(sc.sites||[]).filter(s=>{
          return (s.title||"").toLowerCase().includes(q)
            || (s.desc||"").toLowerCase().includes(q)
            || (s.url||"").toLowerCase().includes(q);
        }).sort(byOrder);
        if(sites.length) matched.push({cat:c, sc, sites});
      });
    });

    title.textContent="搜索结果";
    meta.textContent=`匹配 ${matched.length} 个二级分类`;

    if(!matched.length){
      content.innerHTML="<div style='padding:20px;color:var(--muted)'>没有搜索结果</div>";
      return;
    }
    const wrap=document.createElement("div");
    wrap.className="subcats";
    matched.forEach(({cat:matchCat, sc, sites})=>{
      wrap.appendChild(renderSubcatBlock(matchCat, sc, sites, true));
    });
    content.innerHTML="";
    content.appendChild(wrap);
    return;
  }

  if(!subcats.length){
    content.innerHTML="<div style='padding:20px;color:var(--muted)'>暂无二级分类</div>";
    return;
  }

  const wrap=document.createElement("div");
  wrap.className="subcats";
  subcats.forEach(sc=>{
    const sites=(sc.sites||[]).slice().sort(byOrder);
    wrap.appendChild(renderSubcatBlock(cat, sc, sites, false));
  });

  content.innerHTML="";
  content.appendChild(wrap);
}

function renderSubcatBlock(cat, subcat, sites, searchMode){
  const box=document.createElement("div");
  box.className="subcat";
  box.id = subcatAnchorId(subcat.id);

  const head=document.createElement("div");
  head.className="subHead";

  const left=document.createElement("div");
  left.innerHTML=`<b>${subcat.name}</b> <span style="color:var(--muted);font-size:12px">（网站 ${sites.length}）</span>`;

  const right=document.createElement("div");
  right.style.display="flex";
  right.style.gap="8px";
  right.style.flexWrap="wrap";

  if(!searchMode){
    const add=button("新增网站","btn ok adminOnly",()=>{ if(requireAdmin()) openSiteModal(cat, subcat, null); });
    right.appendChild(add);
  }
  right.appendChild(button("编辑二级","btn adminOnly",()=>{ if(requireAdmin()) openSubcategoryModal(cat, subcat); }));
  right.appendChild(button("删除二级","btn danger adminOnly",async()=>{
    if(!requireAdmin()) return;
    if(confirm(`确定删除二级「${subcat.name}」？`)){
      cat.subcategories = cat.subcategories.filter(s=>s.id!==subcat.id);
      await saveAll();
      render();
    }
  }));

  head.append(left,right);

  const cards=document.createElement("div");
  cards.className="cards";

  if(!sites.length){
    const empty=document.createElement("div");
    empty.style.gridColumn="1/-1";
    empty.style.padding="18px";
    empty.style.color="var(--muted)";
    empty.textContent=isAdmin() ? "暂无网站，点击新增添加。" : "暂无网站（管理员登录后可添加）。";
    cards.appendChild(empty);
  }else{
    sites.forEach(site=>cards.appendChild(renderSiteCard(cat, subcat, site)));
  }

  box.append(head, cards);
  return box;
}

function renderSiteCard(cat, subcat, site){
  const card=document.createElement("div");
  card.className="card";
    const canClickWholeCard = !isAdmin();

  if(canClickWholeCard){
    card.style.cursor = "pointer";
    card.addEventListener("click",(e)=>{
      if(e.target.closest("a,button")) return;
      if(site.url) window.open(site.url,"_blank","noopener,noreferrer");
      else toast("无URL");
    });
  }

  // drag-sort meta (admin only)
  card.dataset.siteId = site.id;
  card.dataset.catId = cat.id;
  card.dataset.subId = subcat.id;
  card.draggable = isAdmin(); // only admin can drag-sort

  // Tooltip hover
  card.addEventListener("mouseenter",(e)=>{
    if(window.matchMedia && window.matchMedia("(hover: none)").matches) return;
    showTooltip({ title: site.title||"", url: site.url||"", desc: site.desc||"" });
    moveTooltip(e.clientX, e.clientY);
  });
  card.addEventListener("mousemove",(e)=>moveTooltip(e.clientX, e.clientY));
  card.addEventListener("mouseleave",()=>hideTooltip());

  const top=document.createElement("div");
  top.style.display="flex";
  top.style.justifyContent="space-between";
  top.style.gap="10px";

  const left=document.createElement("div");
  left.style.display="flex";
  left.style.gap="10px";
  left.style.minWidth="0";

  const icon=document.createElement("img");
  icon.src=resolveIconSrc(site);
  icon.onerror = () => {
  const siteUrl = site.url || "";
  const domain = getDomainFromUrl(siteUrl);

  if(!domain){
    icon.onerror = null;
    icon.src = placeholderIconDataUrl();
    return;
  }

  // ① favicon.ico 失败 → 尝试 /icon.ico
  if(icon.src.endsWith("/favicon.ico")){
    icon.src = `${location.protocol}//${domain}/icon.ico`;
    return;
  }

  // ② icon.ico 失败 → 回退到 Google s2
  if(icon.src.endsWith("/icon.ico")){
    icon.src = `https://www.google.com/s2/favicons?domain=${encodeURIComponent(domain)}&sz=64`;
    return;
  }

  // ③ Google 也失败 → 占位图
  icon.onerror = null;
  icon.src = placeholderIconDataUrl();
};

  icon.style.width="34px";
  icon.style.height="34px";
  icon.style.borderRadius="12px";
  icon.style.border="1px solid rgba(16,24,40,.12)";
  icon.style.flex="0 0 auto";

  const info=document.createElement("div");
  info.style.minWidth="0";

  const t=document.createElement("div");
  t.className="cardTitle";
  t.textContent=site.title||"(未命名)";
  t.title = site.title || "";

  const u=document.createElement("a");
  u.className="cardUrl";
  u.href=site.url||"#";
  u.target="_blank";
  u.rel="noopener noreferrer";
  u.textContent=shortUrl(site.url);
  u.title=site.url||"";

  info.append(t,u);
  left.append(icon,info);

  const acts=document.createElement("div");
  acts.style.display="flex";
  acts.style.gap="6px";

  const go=button("↗","btn",()=>site.url?window.open(site.url,"_blank","noopener,noreferrer"):toast("无URL"));
  go.style.padding="6px 10px";

  const edit=button("✎","btn adminOnly",()=>{ if(requireAdmin()) openSiteModal(cat, subcat, site); });
  edit.style.padding="6px 10px";

  const del=button("🗑","btn danger adminOnly",async()=>{
    if(!requireAdmin()) return;
    if(confirm(`确定删除「${site.title}」？`)){
      subcat.sites = (subcat.sites||[]).filter(s=>s.id!==site.id);
      await saveAll();
      render();
    }
  });
  del.style.padding="6px 10px";

  // drag handle (admin only)
  let dhandle = document.createElement("span");
  dhandle.className = "dragHandle adminOnly";
  dhandle.textContent = "⠿";
  dhandle.title = "拖拽排序";
  dhandle.setAttribute("aria-label","拖拽排序");
  // prevent click opening
  dhandle.addEventListener("click",(e)=>{ e.preventDefault(); e.stopPropagation(); });

  if(!canClickWholeCard) acts.append(go);
  acts.append(dhandle, edit, del);

  top.append(left, acts);

  const desc=document.createElement("div");
  desc.className="cardDesc";
  desc.textContent=site.desc||"";

  card.append(top, desc);
  return card;
}
</script>
<script>
/** ==========================
 *  登录弹窗
 * ========================== */
function openLoginModal(){
  const u = input("账号", "");
  const p = input("密码", "", "password");
  u.el.autocomplete = "username";
  p.el.autocomplete = "current-password";

  const hint = document.createElement("div");
  hint.style.fontSize="12px";
  hint.style.color="var(--muted)";
  hint.textContent="登录成功后可编辑/保存到数据库（多设备同步）";

  const btnCancel = button("取消","btn",closeModal);
  const btnOk = button("登录","btn primary", async ()=>{
    const user = u.el.value.trim();
    const pass = p.el.value;
    if(!user || !pass) return toast("请输入账号密码");
    try{
      const out = await apiLogin(user, pass);
      setAdminToken(out.token);
      closeModal();
      toast("登录成功");
    }catch{
      toast("账号或密码错误");
    }
  });

  openModal("管理员登录",[u.wrap,p.wrap,hint],[btnCancel,btnOk]);
}

/** ==========================
 *  CRUD：一级分类
 * ========================== */
function openCategoryModal(cat){
  if(!requireAdmin()) return;
  const isNew = !cat;
  const data = cat ? {...cat} : { id: uid(), name:"", icon:"📁", order: nextOrder(state.categories), subcategories: [] };

  const name = input("名称", data.name);
  const icon = input("图标（emoji 或图片URL）", data.icon || "📁");
  const order = input("排序（数字越小越靠前）", data.order, "number");

  const btnCancel = button("取消","btn",closeModal);
  const btnSave = button(isNew?"创建":"保存","btn primary", async ()=>{
    const vName=name.el.value.trim();
    const vIcon=icon.el.value.trim();
    const vOrder=parseInt(order.el.value,10);
    if(!vName) return toast("请输入名称");
    data.name=vName;
    data.icon=vIcon || "📁";
    data.order=Number.isFinite(vOrder)?vOrder:999;

    if(isNew){
      state.categories.push(data);
      activeCatId=data.id;
    }else{
      const idx=state.categories.findIndex(c=>c.id===data.id);
      if(idx>=0){
        data.subcategories = state.categories[idx].subcategories || [];
        state.categories[idx]=data;
      }
    }

    await saveAll();
    render();
    closeModal();
    toast("已保存");
  });

  openModal(isNew?"新增一级分类":"编辑一级分类",[row2(name.wrap, order.wrap), icon.wrap],[btnCancel,btnSave]);
}

/** ==========================
 *  CRUD：二级分类
 * ========================== */
function openSubcategoryModal(cat, subcat){
  if(!requireAdmin()) return;
  const isNew = !subcat;
  const data = subcat ? {...subcat} : { id: uid(), name:"", order: nextOrder(cat.subcategories||[]), sites: [] };

  const name = input("名称", data.name);
  const order = input("排序（数字越小越靠前）", data.order, "number");

  const btnCancel = button("取消","btn",closeModal);
  const btnSave = button(isNew?"创建":"保存","btn primary", async ()=>{
    const vName=name.el.value.trim();
    const vOrder=parseInt(order.el.value,10);
    if(!vName) return toast("请输入名称");
    data.name=vName;
    data.order=Number.isFinite(vOrder)?vOrder:999;

    cat.subcategories ||= [];
    if(isNew){
      cat.subcategories.push(data);
    }else{
      const idx=cat.subcategories.findIndex(s=>s.id===data.id);
      if(idx>=0){
        data.sites = cat.subcategories[idx].sites || [];
        cat.subcategories[idx]=data;
      }
    }

    await saveAll();
    render();
    closeModal();
    toast("已保存");
  });

  openModal(isNew?"新增二级分类":"编辑二级分类",[row2(name.wrap, order.wrap)],[btnCancel,btnSave]);
}

/** ==========================
 *  CRUD：网站（含 icon 上传转 base64）
 * ========================== */
function openSiteModal(cat, subcat, site){
  if(!requireAdmin()) return;

  const isNew=!site;
  const data = site ? {...site} : { id: uid(), title:"", url:"", desc:"", icon:"", order: nextOrder(subcat.sites||[]) };

  const title = input("标题", data.title);
  const url = input("URL", data.url, "url");
  const order = input("排序（数字越小越靠前）", data.order, "number");
  const icon = input("Icon（可选：粘贴图片URL或base64；为空则自动favicon）", data.icon||"");
  const desc = textarea("描述", data.desc||"");

  // 上传转 base64
  const uploadBox = document.createElement("div");
  uploadBox.style.border="1px dashed rgba(16,24,40,.2)";
  uploadBox.style.borderRadius="14px";
  uploadBox.style.padding="10px";
  uploadBox.style.background="#f9fafb";

  const upLab = document.createElement("div");
  upLab.style.fontSize="12px";
  upLab.style.color="var(--muted)";
  upLab.style.marginBottom="6px";
  upLab.textContent="上传Icon（转 base64 写入 Icon 字段）";

  const file = document.createElement("input");
  file.type="file";
  file.accept="image/*";

  const help = document.createElement("div");
  help.style.fontSize="12px";
  help.style.color="var(--muted)";
  help.style.marginTop="6px";
  help.innerHTML = "建议小图（64/128），过大的 base64 会影响加载。";

  const preview = document.createElement("div");
  preview.style.display="flex";
  preview.style.gap="10px";
  preview.style.alignItems="center";
  preview.style.marginTop="10px";

  const img = document.createElement("img");
  img.style.width="44px";
  img.style.height="44px";
  img.style.borderRadius="14px";
  img.style.border="1px solid rgba(16,24,40,.12)";

  const clearBtn = button("清空手动Icon（改用自动favicon）","btn",()=>{
    icon.el.value="";
    refreshPreview();
    toast("已清空");
  });
  clearBtn.style.padding="6px 10px";

  preview.append(img, clearBtn);

  function refreshPreview(){
    const manual = icon.el.value.trim();
    if(manual){
      img.src = manual;
      img.onerror=()=>{ img.onerror=null; img.src=placeholderIconDataUrl(); };
      return;
    }
    img.src = autoFaviconUrl(url.el.value.trim(), 64) || placeholderIconDataUrl();
    img.onerror=()=>{ img.onerror=null; img.src=placeholderIconDataUrl(); };
  }

  icon.el.addEventListener("input", refreshPreview);
  url.el.addEventListener("input", refreshPreview);

  file.onchange=()=>{
    const f=file.files?.[0];
    if(!f) return;
    if(f.size > 300*1024){
      if(!confirm("图片较大，转base64会占空间且慢，仍继续？")) return;
    }
    const reader=new FileReader();
    reader.onload=()=>{
      icon.el.value=String(reader.result||"");
      refreshPreview();
      toast("已转base64");
    };
    reader.readAsDataURL(f);
  };

  uploadBox.append(upLab, file, help, preview);
  refreshPreview();

  const btnCancel = button("取消","btn",closeModal);
  const btnSave = button(isNew?"创建":"保存","btn primary", async ()=>{
    const vTitle=title.el.value.trim();
    const vUrl=url.el.value.trim();
    const vOrder=parseInt(order.el.value,10);
    if(!vTitle) return toast("请输入标题");
    if(!vUrl) return toast("请输入URL");

    data.title=vTitle;
    data.url=vUrl;
    data.order=Number.isFinite(vOrder)?vOrder:999;
    data.icon=icon.el.value.trim();
    data.desc=desc.el.value.trim();

    subcat.sites ||= [];
    if(isNew){
      subcat.sites.push(data);
    }else{
      const idx=subcat.sites.findIndex(s=>s.id===data.id);
      if(idx>=0) subcat.sites[idx]=data;
    }

    await saveAll();
    render();
    closeModal();
    toast("已保存");
  });

  openModal(isNew?"新增网站":"编辑网站",
    [
      row2(title.wrap, order.wrap),
      url.wrap,
      icon.wrap,
      uploadBox,
      desc.wrap
    ],
    [btnCancel, btnSave]
  );
}

/** ==========================
 *  导入/导出
 * ========================== */
document.getElementById("btnExport").onclick=()=>{
  if(!requireAdmin()) return;
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`nav_export_${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast("已导出");
};

document.getElementById("btnImport").onclick=()=>{
  if(!requireAdmin()) return;
  const inp=document.createElement("input");
  inp.type="file";
  inp.accept="application/json";
  inp.onchange=async()=>{
    const f=inp.files?.[0];
    if(!f) return;
    try{
      const txt=await f.text();
      const obj=JSON.parse(txt);
      if(!obj || !Array.isArray(obj.categories)) throw new Error("格式错误：需要 categories 数组");

      obj.categories.forEach(c=>{
        if(typeof c.icon !== "string") c.icon = "";
        c.subcategories ||= [];
        c.subcategories.forEach(s=>{
          s.sites ||= [];
          s.sites.forEach(site=>{ if(typeof site.icon !== "string") site.icon=""; });
        });
      });

      state=obj;
      activeCatId=state.categories[0]?.id || null;
      await saveAll();
      render();
      toast("已导入并同步");
    }catch(e){

};

// ===== Scroll-to-next/prev top-level category (edge-overscroll; supports non-scrollable single-subcat) =====
(function(){
  // Use the actual scroll container (right panel)
  const scroller = document.querySelector("main.panel") || document.getElementById("content");
  if(!scroller) return;

  const EDGE = 2;          // px tolerance
  const WHEEL_MIN = 28;    // ignore tiny wheel deltas
  const TOUCH_MIN = 24;    // px
  const COOLDOWN = 900;    // ms
  const STREAK_MS = 450;   // two attempts within this window
  let lastSwitchAt = 0;

  let lastEdgeAttemptAt = 0;
  let edgeAttemptDir = 0; // +1 bottom->next, -1 top->prev
  let lastScrollTop = 0;

  function orderedCats(){
    return ([...(state.categories||[])]).sort(byOrder).filter(c=>c && c.id);
  }
  function gotoCatByDelta(delta){
    const cats = orderedCats();
    if(!cats.length) return false;
    let idx = cats.findIndex(c=>c.id===activeCatId);
    if(idx<0) idx=0;
    const next = cats[idx + delta];
    if(!next) return false;

    activeCatId = next.id;
    activeSubcatId = null;
    expandedCatIds.add(activeCatId);
    render();
    requestAnimationFrame(()=>{ scroller.scrollTop = 0; });
    return true;
  }

  function isScrollable(){
    return scroller.scrollHeight > (scroller.clientHeight + EDGE);
  }
  function nearTop(){
    if(!isScrollable()) return true; // non-scrollable => both edges
    return scroller.scrollTop <= EDGE;
  }
  function nearBottom(){
    if(!isScrollable()) return true;
    return (scroller.scrollTop + scroller.clientHeight) >= (scroller.scrollHeight - EDGE);
  }
  function canSwitch(){
    const now = Date.now();
    if(now - lastSwitchAt < COOLDOWN) return false;
    lastSwitchAt = now;
    return true;
  }
  function recordEdgeAttempt(dir){
    const now = Date.now();
    if(edgeAttemptDir === dir && (now - lastEdgeAttemptAt) <= STREAK_MS){
      edgeAttemptDir = 0;
      lastEdgeAttemptAt = 0;
      return true;
    }
    edgeAttemptDir = dir;
    lastEdgeAttemptAt = now;
    return false;
  }

  // Wheel / trackpad
  scroller.addEventListener("wheel", (e)=>{
    const dy = e.deltaY || 0;

    const curTop = scroller.scrollTop;
    const scrolling = curTop !== lastScrollTop;
    lastScrollTop = curTop;

    if(Math.abs(dy) < WHEEL_MIN) return;

    // If it's scrollable and still scrolling, don't switch
    if(isScrollable() && scrolling) return;

    if(dy > 0 && nearBottom()){
      if(!recordEdgeAttempt(+1)) return;
      if(!canSwitch()) return;
      if(gotoCatByDelta(+1)) e.preventDefault();
    }else if(dy < 0 && nearTop()){
      if(!recordEdgeAttempt(-1)) return;
      if(!canSwitch()) return;
      if(gotoCatByDelta(-1)) e.preventDefault();
    }
  }, {passive:false});

  // Touch
  let tsY=0;
  scroller.addEventListener("touchstart", (e)=>{
    if(e.touches.length!==1) return;
    tsY = e.touches[0].clientY;
  }, {passive:true});

  scroller.addEventListener("touchend", (e)=>{
    const t = (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0] : null;
    if(!t) return;
    const dy = t.clientY - tsY; // down positive, up negative

    if(dy < -TOUCH_MIN && nearBottom()){
      if(!recordEdgeAttempt(+1)) return;
      if(!canSwitch()) return;
      gotoCatByDelta(+1);
    }else if(dy > TOUCH_MIN && nearTop()){
      if(!recordEdgeAttempt(-1)) return;
      if(!canSwitch()) return;
      gotoCatByDelta(-1);
    }
  }, {passive:true});
})();

/* ===== Drag sort (site cards) - delegated (admin only, handle-armed) ===== */
(function(){
  let dragging = null;

  // Arm drag when user presses the handle (dragstart target is the draggable card, not the handle)
  let armedSiteId = null;
  let armedAt = 0;
  const ARM_TTL = 1200;

  document.addEventListener("pointerdown", (e)=>{
    const handle = e.target && e.target.closest ? e.target.closest(".dragHandle") : null;
    if(!handle) return;
    const card = handle.closest('.card[data-site-id]');
    if(!card) return;
    armedSiteId = String(card.dataset.siteId || "");
    armedAt = Date.now();
  }, {passive:true});

  function isArmed(card){
    if(!card || !armedSiteId) return false;
    if(String(card.dataset.siteId||"") !== armedSiteId) return false;
    if(Date.now() - armedAt > ARM_TTL) return false;
    return true;
  }

  function getSubcat(catId, subId){
    const cat = (state.categories||[]).find(c=>String(c.id)===String(catId));
    if(!cat) return null;
    return (cat.subcategories||[]).find(s=>String(s.id)===String(subId)) || null;
  }
  function renumber(list){ list.forEach((it,i)=> it.order = (i+1)*10); }

  document.addEventListener("dragstart", (e)=>{
    const card = e.target && e.target.closest ? e.target.closest('.card[data-site-id]') : null;
    if(!card) return;

    if(!isAdmin() || !isArmed(card)){
      e.preventDefault();
      return;
    }

    dragging = {
      siteId: String(card.dataset.siteId),
      catId: String(card.dataset.catId),
      subId: String(card.dataset.subId)
    };

    card.classList.add("dragging");
    if(e.dataTransfer){
      e.dataTransfer.effectAllowed = "move";
      try{ e.dataTransfer.setData("text/plain", dragging.siteId); }catch{}
    }
  });

  document.addEventListener("dragend", (e)=>{
    const card = e.target && e.target.closest ? e.target.closest('.card[data-site-id]') : null;
    if(card) card.classList.remove("dragging");
    dragging = null;
    armedSiteId = null;
    armedAt = 0;
    document.querySelectorAll(".card.dropHint").forEach(el=>el.classList.remove("dropHint"));
  });

  document.addEventListener("dragover", (e)=>{
    if(!dragging) return;
    const over = e.target && e.target.closest ? e.target.closest('.card[data-site-id]') : null;
    if(!over) return;
    if(String(over.dataset.catId)!==dragging.catId || String(over.dataset.subId)!==dragging.subId) return;

    e.preventDefault();
    if(e.dataTransfer) e.dataTransfer.dropEffect="move";

    document.querySelectorAll(".card.dropHint").forEach(el=>el.classList.remove("dropHint"));
    over.classList.add("dropHint");
  }, {passive:false});

  document.addEventListener("drop", async (e)=>{
    if(!dragging) return;
    const over = e.target && e.target.closest ? e.target.closest('.card[data-site-id]') : null;
    if(!over) return;
    if(String(over.dataset.catId)!==dragging.catId || String(over.dataset.subId)!==dragging.subId) return;

    e.preventDefault();

    const sub = getSubcat(dragging.catId, dragging.subId);
    if(!sub) return;
    const list = sub.sites || (sub.sites=[]);

    const from = list.findIndex(x=>String(x.id)===dragging.siteId);
    const to = list.findIndex(x=>String(x.id)===String(over.dataset.siteId));
    if(from<0 || to<0 || from===to) return;

    const [moved] = list.splice(from,1);
    list.splice(to,0,moved);
    renumber(list);

    await saveAll();
    render();
  });
})();
